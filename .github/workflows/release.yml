name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: use musl targets for fully-static binaries that run on any
          # glibc version (Debian 10+, Ubuntu 18.04+, RHEL/CentOS 7+, Alpine).
          # Building with glibc on `ubuntu-latest` produces binaries that
          # require the runner's newest glibc (2.39 on ubuntu-24.04) and
          # fail on older systems.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: anycode-linux-x86_64
            cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: anycode-linux-aarch64
            cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: anycode-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: anycode-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/anycode ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            artifacts/anycode-linux-x86_64
            artifacts/anycode-linux-aarch64
            artifacts/anycode-macos-x86_64
            artifacts/anycode-macos-aarch64
          fail_on_unmatched_files: false
